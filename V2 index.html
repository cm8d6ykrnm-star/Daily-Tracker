<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Daily 75" />
  <meta name="theme-color" content="#140c2e" />
  <title>Daily 75</title>
  <style>
    :root{--bg:#0b0718;--card:rgba(255,255,255,.10);--card2:rgba(255,255,255,.16);--text:#fff;--muted:rgba(255,255,255,.68);--line:rgba(255,255,255,.14);--accent:#b86cff;--accent2:#ff6bb5;--good:#7cf7c2;--danger:#ff6b8a;}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;background:radial-gradient(circle at 20% 0%,#4920a5 0,#171038 34%,#0b0718 76%);color:var(--text);min-height:100vh;padding:env(safe-area-inset-top) 16px calc(24px + env(safe-area-inset-bottom));}
    .app{max-width:480px;margin:0 auto;padding:18px 0 90px}.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}.hello{font-size:15px;color:var(--muted)}h1{font-size:30px;line-height:1;margin:5px 0 0}.pill{border:1px solid var(--line);background:rgba(255,255,255,.08);border-radius:999px;padding:10px 12px;font-size:13px;color:var(--muted)}
    .hero{position:relative;overflow:hidden;border:1px solid var(--line);border-radius:30px;padding:22px;background:linear-gradient(145deg,rgba(255,255,255,.18),rgba(255,255,255,.07));box-shadow:0 24px 60px rgba(0,0,0,.35)}.hero:before{content:"";position:absolute;inset:-80px -60px auto auto;width:210px;height:210px;background:radial-gradient(circle,var(--accent2),transparent 68%);opacity:.42}.herogrid{display:grid;grid-template-columns:140px 1fr;gap:18px;align-items:center;position:relative}.ring{width:140px;height:140px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--accent2) calc(var(--p)*1%),rgba(255,255,255,.13) 0);box-shadow:inset 0 0 0 1px rgba(255,255,255,.08)}.ring:after{content:"";position:absolute;width:104px;height:104px;border-radius:50%;background:rgba(8,5,20,.88);box-shadow:inset 0 0 30px rgba(255,255,255,.05)}.ringtext{position:relative;z-index:1;text-align:center}.big{font-size:28px;font-weight:800}.small{font-size:12px;color:var(--muted)}.status h2{font-size:22px;margin:0 0 8px}.status p{margin:0;color:var(--muted);line-height:1.35}.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:16px}.stat{background:rgba(0,0,0,.18);border:1px solid var(--line);border-radius:18px;padding:12px}.stat b{display:block;font-size:18px}.stat span{font-size:12px;color:var(--muted)}
    .section{display:flex;align-items:center;justify-content:space-between;margin:24px 2px 12px}.section h3{margin:0;font-size:18px}.btn{border:0;border-radius:16px;background:var(--card2);color:white;padding:10px 12px;font-weight:650}.tasks{display:grid;gap:12px}.task{display:flex;align-items:center;gap:13px;width:100%;border:1px solid var(--line);border-radius:22px;background:var(--card);padding:15px 14px;color:white;text-align:left;backdrop-filter:blur(18px);transition:.18s transform,.18s background}.task:active{transform:scale(.98)}.task.done{background:linear-gradient(135deg,rgba(184,108,255,.30),rgba(255,107,181,.22));}.check{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;border:1px solid rgba(255,255,255,.28);font-weight:900}.done .check{background:linear-gradient(135deg,var(--accent),var(--accent2));border:0}.emoji{font-size:23px;width:30px}.taskname{font-size:16px;font-weight:700}.tasksub{font-size:12px;color:var(--muted);margin-top:2px}.spacer{flex:1}.edit{opacity:.6;font-size:18px;padding:6px}.quote{margin-top:18px;border-radius:24px;border:1px solid var(--line);background:rgba(255,255,255,.08);padding:16px;color:rgba(255,255,255,.82);line-height:1.4}.nav{position:fixed;left:16px;right:16px;bottom:calc(14px + env(safe-area-inset-bottom));max-width:480px;margin:auto;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;background:rgba(15,10,33,.78);border:1px solid var(--line);backdrop-filter:blur(20px);border-radius:24px;padding:8px}.nav button{border:0;background:transparent;color:var(--muted);border-radius:18px;padding:10px;font-weight:700}.nav button.active{background:rgba(255,255,255,.14);color:white}.panel{display:none}.panel.active{display:block}.settings{display:grid;gap:12px}.field{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:14px}.field label{display:block;color:var(--muted);font-size:12px;margin-bottom:7px}.field input,.field textarea{width:100%;border:0;outline:0;background:transparent;color:white;font:inherit}.row{display:flex;gap:10px}.row .field{flex:1}.danger{background:rgba(255,107,138,.16);color:#fff;border:1px solid rgba(255,107,138,.3)}.modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:flex-end;padding:16px;z-index:5}.sheet{width:100%;max-width:480px;margin:0 auto;background:#17102f;border:1px solid var(--line);border-radius:28px;padding:18px}.modal.show{display:flex}.sheet h3{margin:0 0 12px}.sheet input{width:100%;margin:8px 0;padding:14px;border-radius:16px;border:1px solid var(--line);background:rgba(255,255,255,.08);color:white;font:inherit}.sheet .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}@media(max-width:380px){.herogrid{grid-template-columns:120px 1fr}.ring{width:120px;height:120px}.ring:after{width:90px;height:90px}.big{font-size:24px}}
  </style>
</head>
<body>
  <div class="app">
    <div class="top"><div><div class="hello">Deine Challenge</div><h1>Daily 75</h1></div><div class="pill" id="datePill"></div></div>
    <div id="home" class="panel active">
      <section class="hero"><div class="herogrid"><div class="ring" id="ring" style="--p:0"><div class="ringtext"><div class="big" id="percent">0%</div><div class="small" id="doneCount">0/0 erledigt</div></div></div><div class="status"><h2 id="dayTitle">Tag 1 von 75</h2><p id="statusText">Heute zählt nur der nächste Haken.</p></div></div><div class="stats"><div class="stat"><b id="streak">0</b><span>Streak</span></div><div class="stat"><b id="daysDone">0</b><span>volle Tage</span></div><div class="stat"><b id="left">75</b><span>übrig</span></div></div></section>
      <div class="section"><h3>Heute abhaken</h3><button class="btn" onclick="openAdd()">+ Aufgabe</button></div><div class="tasks" id="taskList"></div><div class="quote" id="quote"></div>
    </div>
    <div id="stats" class="panel"><div class="section"><h3>Statistik</h3></div><section class="hero"><h2>Dein Fortschritt</h2><p id="statsText" style="color:var(--muted);line-height:1.45"></p><div class="stats"><div class="stat"><b id="sDay">1</b><span>aktueller Tag</span></div><div class="stat"><b id="sBest">0</b><span>bester Streak</span></div><div class="stat"><b id="sTotal">0</b><span>Checks total</span></div></div></section></div>
    <div id="settings" class="panel"><div class="section"><h3>Einstellungen</h3></div><div class="settings"><div class="row"><div class="field"><label>Challenge-Start</label><input type="date" id="startDate"></div><div class="field"><label>Tage</label><input type="number" id="length" min="1" max="365"></div></div><div class="field"><label>Motivation / Notiz</label><textarea id="note" rows="3" placeholder="Dein Warum..."></textarea></div><button class="btn" onclick="saveSettings()">Speichern</button><button class="btn danger" onclick="resetToday()">Heute zurücksetzen</button></div></div>
  </div>
  <div class="nav"><button class="active" onclick="tab('home',this)">Heute</button><button onclick="tab('stats',this)">Stats</button><button onclick="tab('settings',this)">Setup</button></div>
  <div class="modal" id="modal"><div class="sheet"><h3>Aufgabe bearbeiten</h3><input id="taskEmoji" placeholder="Emoji, z.B. 💧"><input id="taskName" placeholder="Name"><input id="taskSub" placeholder="Untertitel"><div class="actions"><button class="btn" onclick="closeModal()">Abbrechen</button><button class="btn" onclick="saveTask()">Speichern</button></div><button class="btn danger" style="width:100%;margin-top:10px" onclick="deleteTask()">Löschen</button></div></div>
  <script>
    const KEY='daily75.v1'; const today=()=>new Date().toISOString().slice(0,10);
    const defaults={start:today(), length:75, note:'Nicht perfekt. Nur heute ehrlich abhaken.', tasks:[['💧','Wasser','Dein Tagesziel'],['🏋️','Workout','Bewegung zählt'],['🚶','Spaziergang','Rauskommen'],['📖','Lesen','Ein paar Seiten'],['📸','Progress-Foto','Optional, aber stark'],['🍎','Ernährung','Deine Regel'],['✍️','Journal','Kurz reflektieren'],['🐴','Pferd','Zeit draußen']].map((x,i)=>({id:crypto.randomUUID(),emoji:x[0],name:x[1],sub:x[2]})), checks:{}, fullDays:[], best:0};
    let data=JSON.parse(localStorage.getItem(KEY)||'null')||defaults; let editing=null;
    function persist(){localStorage.setItem(KEY,JSON.stringify(data))}
    function dayNum(){return Math.min(data.length,Math.max(1,Math.floor((new Date(today())-new Date(data.start))/(86400000))+1))}
    function todays(){data.checks[today()] ||= {}; return data.checks[today()]}
    function render(){document.getElementById('datePill').textContent=new Date().toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit'}); const c=todays(); const done=data.tasks.filter(t=>c[t.id]).length; const total=data.tasks.length; const p=total?Math.round(done/total*100):0; ring.style.setProperty('--p',p); percent.textContent=p+'%'; doneCount.textContent=done+'/'+total+' erledigt'; dayTitle.textContent='Tag '+dayNum()+' von '+data.length; statusText.textContent=p===100?'Alles erledigt. Stark. ✨':'Heute zählt nur der nächste Haken.'; left.textContent=Math.max(0,data.length-dayNum()); streak.textContent=getStreak(); daysDone.textContent=data.fullDays.length; quote.textContent=data.note||'Ein Haken nach dem anderen.'; taskList.innerHTML=''; data.tasks.forEach(t=>{let b=document.createElement('button'); b.className='task '+(c[t.id]?'done':''); b.innerHTML=`<div class="check">${c[t.id]?'✓':''}</div><div class="emoji">${t.emoji}</div><div><div class="taskname">${t.name}</div><div class="tasksub">${t.sub||''}</div></div><div class="spacer"></div><div class="edit">⋯</div>`; b.onclick=(e)=>{ if(e.target.className==='edit'){openEdit(t.id);return} toggle(t.id)}; taskList.appendChild(b)}); startDate.value=data.start; length.value=data.length; note.value=data.note; sDay.textContent=dayNum(); sBest.textContent=data.best||0; sTotal.textContent=Object.values(data.checks).reduce((a,o)=>a+Object.values(o).filter(Boolean).length,0); statsText.textContent=`Du bist bei Tag ${dayNum()} von ${data.length}. Volle Tage: ${data.fullDays.length}. Dein aktueller Streak: ${getStreak()} Tag(e).`; }
    function toggle(id){todays()[id]=!todays()[id]; updateFull(); if(navigator.vibrate) navigator.vibrate(18); persist(); render()}
    function updateFull(){const c=todays(); const full=data.tasks.length && data.tasks.every(t=>c[t.id]); const d=today(); data.fullDays=data.fullDays.filter(x=>x!==d); if(full)data.fullDays.push(d); data.best=Math.max(data.best||0,getStreak())}
    function getStreak(){let n=0; let d=new Date(today()); while(true){let s=d.toISOString().slice(0,10); if(data.fullDays.includes(s)){n++; d.setDate(d.getDate()-1)} else break} return n}
    function tab(id,el){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active')); el.classList.add('active'); render()}
    function openAdd(){editing=null; taskEmoji.value='✨'; taskName.value=''; taskSub.value=''; modal.classList.add('show')}
    function openEdit(id){editing=id; const t=data.tasks.find(x=>x.id===id); taskEmoji.value=t.emoji; taskName.value=t.name; taskSub.value=t.sub; modal.classList.add('show')}
    function closeModal(){modal.classList.remove('show')}
    function saveTask(){if(!taskName.value.trim())return; if(editing){Object.assign(data.tasks.find(t=>t.id===editing),{emoji:taskEmoji.value||'✨',name:taskName.value.trim(),sub:taskSub.value.trim()})}else data.tasks.push({id:crypto.randomUUID(),emoji:taskEmoji.value||'✨',name:taskName.value.trim(),sub:taskSub.value.trim()}); closeModal(); persist(); render()}
    function deleteTask(){if(editing){data.tasks=data.tasks.filter(t=>t.id!==editing); closeModal(); persist(); render()}}
    function saveSettings(){data.start=startDate.value||today(); data.length=Number(length.value)||75; data.note=note.value; persist(); render()}
    function resetToday(){if(confirm('Alle Häkchen von heute löschen?')){data.checks[today()]={}; data.fullDays=data.fullDays.filter(x=>x!==today()); persist(); render()}}
    render();
  </script>
</body>
</html>
