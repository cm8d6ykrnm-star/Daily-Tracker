<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Daily" />
<meta name="theme-color" content="#11131f" />
<title>Daily</title>
<style>
:root{
  --bg:#10121d;--card:rgba(255,255,255,.09);--card2:rgba(255,255,255,.13);--text:#f7f7fb;--muted:#a8adbf;
  --blue:#65b8ff;--orange:#ffb15e;--brown:#c99b70;--green:#7ee0a2;--lime:#b8ef76;--purple:#c59cff;--teal:#74e1dc;--yellow:#ffd96b;--gray:#c4c8d4;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;background:radial-gradient(circle at top left,#28365f 0,#141827 36%,#10121d 70%);color:var(--text);min-height:100vh;padding:env(safe-area-inset-top) 16px calc(90px + env(safe-area-inset-bottom));}
.app{max-width:520px;margin:0 auto}.top{display:flex;justify-content:space-between;align-items:center;padding:18px 2px 12px}.brand{font-size:34px;font-weight:800;letter-spacing:-1px}.date{color:var(--muted);font-size:14px;margin-top:2px}.pill{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.14);padding:10px 12px;border-radius:999px;font-weight:700;font-size:14px}.hero{display:grid;grid-template-columns:145px 1fr;gap:14px;align-items:center;background:linear-gradient(135deg,rgba(255,255,255,.13),rgba(255,255,255,.05));border:1px solid rgba(255,255,255,.14);box-shadow:0 22px 60px rgba(0,0,0,.25);border-radius:32px;padding:18px;margin-bottom:16px;backdrop-filter:blur(22px)}.ring{width:132px;height:132px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--blue) calc(var(--p)*1%),rgba(255,255,255,.12) 0);position:relative}.ring:after{content:"";position:absolute;inset:12px;background:#151928;border-radius:50%;box-shadow:inset 0 0 20px rgba(255,255,255,.04)}.ring span{z-index:1;font-size:30px;font-weight:850}.hero h2{font-size:22px;margin:0 0 6px}.hero p{margin:0;color:var(--muted);line-height:1.35}.xp{font-size:22px;font-weight:800;margin-top:14px}.focus{background:rgba(101,184,255,.12);border:1px solid rgba(101,184,255,.22);border-radius:24px;padding:14px 16px;margin-bottom:14px}.focus b{display:block;margin-bottom:4px}.grid{display:grid;gap:12px}.card{position:relative;overflow:hidden;background:var(--card);border:1px solid rgba(255,255,255,.12);border-radius:28px;padding:16px;min-height:92px;box-shadow:0 14px 38px rgba(0,0,0,.18);backdrop-filter:blur(18px);transition:.22s transform,.22s background}.card:active{transform:scale(.985)}.card.done{background:linear-gradient(135deg,rgba(255,255,255,.17),rgba(255,255,255,.07))}.row{display:flex;align-items:center;justify-content:space-between;gap:10px}.title{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:800}.icon{width:38px;height:38px;border-radius:15px;display:grid;place-items:center;background:rgba(255,255,255,.11);font-size:21px}.sub{color:var(--muted);margin:10px 0 0;font-size:14px}.check{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;border:1px solid rgba(255,255,255,.2);font-weight:900}.done .check{background:rgba(126,224,162,.2);border-color:rgba(126,224,162,.45)}.bar{height:9px;border-radius:99px;background:rgba(255,255,255,.13);overflow:hidden;margin-top:13px}.fill{height:100%;border-radius:99px;background:var(--blue);width:0;transition:.25s width}.water-controls{display:flex;gap:10px}.round{border:0;color:white;background:rgba(255,255,255,.13);width:44px;height:44px;border-radius:18px;font-size:24px;font-weight:800}.big{min-height:142px}.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}.chip{border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.08);color:var(--text);padding:9px 11px;border-radius:999px;font-weight:700}.chip.on{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.28)}.bottom{position:fixed;left:0;right:0;bottom:0;padding:10px 16px calc(10px + env(safe-area-inset-bottom));background:linear-gradient(180deg,transparent,rgba(10,12,20,.9) 25%)}.nav{max-width:520px;margin:auto;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.11);border-radius:26px;padding:8px;backdrop-filter:blur(20px)}.nav button{border:0;background:transparent;color:var(--muted);border-radius:20px;padding:10px 4px;font-weight:800}.nav button.active{background:rgba(255,255,255,.14);color:white}.sheet{position:fixed;inset:0;display:none;align-items:flex-end;background:rgba(0,0,0,.45);z-index:5}.sheet.show{display:flex}.panel{width:100%;max-width:520px;margin:0 auto;background:#1a1d2d;border:1px solid rgba(255,255,255,.14);border-radius:30px 30px 0 0;padding:18px 16px calc(24px + env(safe-area-inset-bottom));box-shadow:0 -20px 60px rgba(0,0,0,.38)}.panel h3{margin:4px 0 14px;font-size:22px}.option{width:100%;border:0;color:white;background:rgba(255,255,255,.09);border-radius:22px;padding:16px;margin:8px 0;text-align:left;font-size:17px;font-weight:800}.hidden{display:none}.statbox{background:var(--card);border:1px solid rgba(255,255,255,.12);border-radius:28px;padding:18px;margin-bottom:12px}.statbox h3{margin:0 0 8px}.tiny{color:var(--muted);font-size:14px;line-height:1.5}textarea,input{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.13);color:white;border-radius:20px;padding:13px;font:inherit;outline:none}.accent-blue{--accent:var(--blue)}.accent-orange{--accent:var(--orange)}.accent-brown{--accent:var(--brown)}.accent-green{--accent:var(--green)}.accent-lime{--accent:var(--lime)}.accent-purple{--accent:var(--purple)}.accent-teal{--accent:var(--teal)}.accent-yellow{--accent:var(--yellow)}.accent-gray{--accent:var(--gray)}.card .icon{background:color-mix(in srgb,var(--accent) 28%,transparent)}.card.done{border-color:color-mix(in srgb,var(--accent) 45%,rgba(255,255,255,.12))}.toast{position:fixed;left:50%;bottom:102px;transform:translateX(-50%) translateY(20px);opacity:0;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(20px);padding:12px 16px;border-radius:999px;font-weight:900;transition:.25s;z-index:10}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body><div class="app"><div class="top"><div><div class="brand">Daily</div><div class="date" id="date"></div></div><div class="pill" id="streak">🔥 0</div></div><section class="hero"><div class="ring" id="ring" style="--p:0"><span id="percent">0%</span></div><div><h2 id="greeting">Guten Morgen</h2><p>Jeder Haken zählt. Kein Stress, nur kleine Schritte.</p><div class="xp" id="xp">⭐ 0 XP</div></div></section><div class="focus"><b>Today's Focus</b><span id="focusText">Trink zuerst dein erstes Glas Wasser.</span></div><main id="viewDaily" class="grid"></main><main id="viewProgress" class="hidden"></main><main id="viewAchievements" class="hidden"></main><main id="viewSettings" class="hidden"></main></div><div class="bottom"><div class="nav"><button class="active" data-view="Daily">🏠<br>Daily</button><button data-view="Progress">📈<br>Progress</button><button data-view="Achievements">🏆<br>Erfolge</button><button data-view="Settings">⚙️<br>Settings</button></div></div><div class="sheet" id="sheet"><div class="panel"><h3 id="sheetTitle"></h3><div id="sheetOptions"></div><button class="option" onclick="closeSheet()">Abbrechen</button></div></div><div class="toast" id="toast"></div><script>
const today=()=>new Date().toISOString().slice(0,10);const key='daily_v12_'+today();const histKey='daily_history_v12';
const base={water:0,sport:'',movement:'',horse:'',nutrition:false,selfcare:[],hygiene:{teeth:false,shower:false,skincare:false},clean:false,todo:false,todoText:''};
let state=JSON.parse(localStorage.getItem(key)||'null')||structuredClone(base);let history=JSON.parse(localStorage.getItem(histKey)||'{}');
const save=()=>{localStorage.setItem(key,JSON.stringify(state));history[today()]={...calc(),state};localStorage.setItem(histKey,JSON.stringify(history));render()};
function doneCount(){let d=0,total=9;if(state.water>=8)d++; if(state.sport)d++; if(state.horse)d++; if(state.movement)d++; if(state.nutrition)d++; if(state.selfcare.length)d++; if(Object.values(state.hygiene).every(Boolean))d++; if(state.clean)d++; if(state.todo)d++; return {d,total}}
function calc(){let xp=0; xp+=Math.min(state.water,8)*2+Math.max(0,state.water-8); if(state.sport)xp+=25;if(state.horse)xp+=20;if(state.movement)xp+=20;if(state.nutrition)xp+=20;if(state.selfcare.length)xp+=15;if(Object.values(state.hygiene).every(Boolean))xp+=10;if(state.clean)xp+=10;if(state.todo)xp+=15;let {d,total}=doneCount();return {xp,percent:Math.round(d/total*100),done:d,total}}
function haptic(){try{navigator.vibrate&&navigator.vibrate(10)}catch(e){}}function toast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1100)}
function card(cls,icon,title,sub,done,onclick,extra=''){return `<section class="card ${cls} ${done?'done':''}" onclick="${onclick||''}"><div class="row"><div class="title"><span class="icon">${icon}</span>${title}</div><div class="check">${done?'✓':''}</div></div><div class="sub">${sub}</div>${extra}</section>`}
function renderDaily(){let waterPct=Math.min(100,state.water/8*100);document.getElementById('viewDaily').innerHTML=`<section class="card big accent-blue"><div class="row"><div class="title"><span class="icon">💧</span>Wasser</div><div class="water-controls"><button class="round" onclick="event.stopPropagation();state.water=Math.max(0,state.water-1);haptic();save()">−</button><button class="round" onclick="event.stopPropagation();state.water++;haptic();toast(state.water>8?'+1 Bonus XP':'+2 XP');save()">+</button></div></div><div class="sub">${state.water} / 8 Gläser ${state.water>8?'⭐ Bonus':''}</div><div class="bar"><div class="fill" style="width:${waterPct}%"></div></div></section>`+
card('accent-orange','🏋️','Sport',state.sport?state.sport+' ✓':'Yoga, Workout, Laufen, Reiten',!!state.sport,"openSheet('sport')")+
card('accent-brown','🐴','Pferd',state.horse?state.horse+' ✓':'Reiten, Bodenarbeit, Pflege, Kuscheln',!!state.horse,"openSheet('horse')")+
card('accent-green','🚶','Bewegung',state.movement?state.movement+' ✓':'Spaziergang, Schrittziel, Radfahren',!!state.movement,"openSheet('movement')")+
card('accent-lime','🥗','Ernährung',state.nutrition?'Clean-Day ✓':'Clean-Day abhaken',state.nutrition,"state.nutrition=!state.nutrition;haptic();save()")+
`<section class="card accent-purple ${state.selfcare.length?'done':''}" onclick="openSheet('selfcare')"><div class="row"><div class="title"><span class="icon">🧘</span>Selfcare</div><div class="check">${state.selfcare.length?'✓':''}</div></div><div class="sub">${state.selfcare.length?state.selfcare.join(', '):'Meditation, Mini-Dusche, Relaxen'}</div></section>`+
`<section class="card accent-teal ${Object.values(state.hygiene).every(Boolean)?'done':''}"><div class="row"><div class="title"><span class="icon">🪥</span>Hygiene</div><div class="check">${Object.values(state.hygiene).every(Boolean)?'✓':''}</div></div><div class="chips">${['teeth:Zähne','shower:Dusche','skincare:Skincare'].map(x=>{let[a,b]=x.split(':');return `<button class="chip ${state.hygiene[a]?'on':''}" onclick="event.stopPropagation();state.hygiene.${a}=!state.hygiene.${a};haptic();save()">${state.hygiene[a]?'✓ ':''}${b}</button>`}).join('')}</div></section>`+
card('accent-yellow','🧹','Aufräumen',state.clean?'Erledigt ✓':'Eine kleine Ecke reicht',state.clean,"state.clean=!state.clean;haptic();save()")+
`<section class="card accent-gray ${state.todo?'done':''}"><div class="row" onclick="state.todo=!state.todo;haptic();save()"><div class="title"><span class="icon">📋</span>To-do</div><div class="check">${state.todo?'✓':''}</div></div><div class="sub">Eine Sache abarbeiten</div><input placeholder="Was hast du erledigt?" value="${state.todoText||''}" oninput="state.todoText=this.value;localStorage.setItem(key,JSON.stringify(state))" onclick="event.stopPropagation()"></section>`}
const opts={sport:['🏋️ Workout','🧘 Yoga','🏃 Laufen','🐴 Reiten'],movement:['🚶 Spaziergang','👣 Schrittziel','🚴 Radfahren','🥾 Wandern'],horse:['🐴 Reiten','🌙 Bodenarbeit','🚶 Spaziergang','🧼 Pflege','❤️ Kuscheln'],selfcare:['🧘 Meditation','🚿 Mini-Dusche','📖 Lesen','✍️ Journaling','🌙 Relaxen']};
function openSheet(type){document.getElementById('sheetTitle').textContent={sport:'Welchen Sport?',movement:'Welche Bewegung?',horse:'Was mit dem Pferd?',selfcare:'Selfcare'}[type];document.getElementById('sheetOptions').innerHTML=opts[type].map(o=>`<button class="option" onclick="choose('${type}','${o.replace(/'/g,"\\'")}')">${o}</button>`).join('')+`<button class="option" onclick="choose('${type}','')">Zurücksetzen</button>`;document.getElementById('sheet').classList.add('show')}
function choose(type,val){if(type==='selfcare'){if(!val)state.selfcare=[];else{let label=val.replace(/^\S+\s/,'');state.selfcare.includes(label)?state.selfcare=state.selfcare.filter(x=>x!==label):state.selfcare.push(label)}}else state[type]=val?val.replace(/^\S+\s/,''):'';closeSheet();haptic();save()}function closeSheet(){document.getElementById('sheet').classList.remove('show')}
function streak(){let s=0;let d=new Date();for(;;){let k=d.toISOString().slice(0,10);if(history[k]&&history[k].percent>0){s++;d.setDate(d.getDate()-1)}else if(k===today()){d.setDate(d.getDate()-1)}else break}return s}
function renderOther(){let vals=Object.entries(history).slice(-7);document.getElementById('viewProgress').innerHTML=`<div class="statbox"><h3>Diese Woche</h3><div class="tiny">${vals.map(([d,v])=>`${d.slice(5)} · ${v.percent}% · ${v.xp} XP`).join('<br>')||'Noch keine Historie.'}</div></div><div class="statbox"><h3>Heute</h3><div class="tiny">${calc().done}/${calc().total} Bereiche · ${calc().xp} XP</div></div>`;document.getElementById('viewAchievements').innerHTML=`<div class="statbox"><h3>🏆 First Steps</h3><div class="tiny">Daily läuft. Du hast die App selbst auf dein iPhone gebracht.</div></div><div class="statbox"><h3>💧 Hydrated</h3><div class="tiny">Heute: ${state.water} Gläser. Ziel: 8.</div></div><div class="statbox"><h3>🔥 Consistency</h3><div class="tiny">Aktueller Streak: ${streak()} Tage.</div></div>`;document.getElementById('viewSettings').innerHTML=`<div class="statbox"><h3>Settings</h3><div class="tiny">V1.2 · Daten werden lokal auf diesem Gerät gespeichert.</div></div><div class="statbox"><h3>Reset heute</h3><button class="option" onclick="state=structuredClone(base);save()">Heutigen Tag zurücksetzen</button></div>`}
function render(){let c=calc();document.getElementById('ring').style.setProperty('--p',c.percent);document.getElementById('percent').textContent=c.percent+'%';document.getElementById('xp').textContent='⭐ '+c.xp+' XP';document.getElementById('streak').textContent='🔥 '+streak();let dt=new Date();document.getElementById('date').textContent=dt.toLocaleDateString('de-AT',{weekday:'long',day:'numeric',month:'long'});document.getElementById('greeting').textContent=dt.getHours()<12?'Guten Morgen':dt.getHours()<18?'Guten Nachmittag':'Guten Abend';document.getElementById('focusText').textContent=state.water<1?'Trink zuerst dein erstes Glas Wasser.':!state.selfcare.length?'Nimm dir heute fünf ruhige Minuten.':'Mach heute einfach den nächsten kleinen Schritt.';renderDaily();renderOther()}
document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active');['Daily','Progress','Achievements','Settings'].forEach(v=>document.getElementById('view'+v).classList.toggle('hidden',v!==b.dataset.view))});document.getElementById('sheet').onclick=e=>{if(e.target.id==='sheet')closeSheet()};save();
</script></body></html>
