<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0b0b16" />
<title>Daily</title>
<style>
:root{--bg:#090914;--card:rgba(255,255,255,.09);--card2:rgba(255,255,255,.13);--text:#f8f7ff;--muted:rgba(248,247,255,.62);--line:rgba(255,255,255,.12);--pink:#ff6fb1;--violet:#8c6cff;--blue:#5ed0ff;--green:#79f2a5;--orange:#ffb86b;--yellow:#ffe07a;--red:#ff7d7d;--shadow:0 18px 45px rgba(0,0,0,.35)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;background:radial-gradient(circle at top left,rgba(255,111,177,.28),transparent 32%),radial-gradient(circle at top right,rgba(94,208,255,.20),transparent 30%),linear-gradient(180deg,#101024,#070710 62%);color:var(--text);min-height:100svh;padding:env(safe-area-inset-top) 16px calc(24px + env(safe-area-inset-bottom));}
.app{max-width:470px;margin:0 auto;padding-top:16px}.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}.brand{font-size:30px;font-weight:850;letter-spacing:-.04em}.pill{background:rgba(255,255,255,.10);border:1px solid var(--line);padding:9px 12px;border-radius:999px;color:var(--muted);font-size:13px;backdrop-filter:blur(18px)}.hero{background:linear-gradient(135deg,rgba(255,255,255,.14),rgba(255,255,255,.06));border:1px solid var(--line);border-radius:34px;padding:20px;box-shadow:var(--shadow);backdrop-filter:blur(22px);position:relative;overflow:hidden}.hero:before{content:"";position:absolute;inset:-60px -60px auto auto;width:170px;height:170px;background:rgba(255,111,177,.24);filter:blur(22px);border-radius:999px}.date{font-size:14px;color:var(--muted);margin-bottom:8px}.headline{font-size:22px;font-weight:750;letter-spacing:-.03em;margin-bottom:18px}.heroGrid{display:grid;grid-template-columns:150px 1fr;gap:18px;align-items:center}.ringWrap{width:144px;height:144px;position:relative;display:grid;place-items:center}.ringWrap svg{transform:rotate(-90deg);position:absolute;inset:0}.ringText{text-align:center}.percent{font-size:32px;font-weight:850;letter-spacing:-.05em}.doneText{font-size:13px;color:var(--muted);margin-top:2px}.stats{display:grid;gap:10px}.stat{background:rgba(0,0,0,.16);border:1px solid var(--line);border-radius:20px;padding:12px}.stat b{display:block;font-size:18px}.stat span{font-size:12px;color:var(--muted)}.sectionTitle{display:flex;justify-content:space-between;align-items:end;margin:22px 3px 12px}.sectionTitle h2{margin:0;font-size:18px;letter-spacing:-.03em}.sectionTitle button{border:0;background:transparent;color:var(--muted);font-size:13px}.cards{display:grid;gap:12px}.card{border:1px solid var(--line);background:var(--card);border-radius:28px;padding:15px;box-shadow:0 10px 25px rgba(0,0,0,.18);backdrop-filter:blur(18px);transition:transform .14s ease,background .14s ease,border-color .14s ease}.card:active{transform:scale(.985)}.card.done{background:linear-gradient(135deg,rgba(121,242,165,.20),rgba(255,255,255,.08));border-color:rgba(121,242,165,.35)}.row{display:flex;align-items:center;justify-content:space-between;gap:14px}.left{display:flex;align-items:center;gap:12px}.icon{width:46px;height:46px;border-radius:18px;display:grid;place-items:center;font-size:23px;background:linear-gradient(135deg,var(--c),rgba(255,255,255,.16));box-shadow:inset 0 1px 0 rgba(255,255,255,.22)}.title{font-weight:760;font-size:17px;letter-spacing:-.02em}.sub{font-size:13px;color:var(--muted);margin-top:2px}.check{width:34px;height:34px;border-radius:50%;border:1px solid var(--line);display:grid;place-items:center;color:transparent;background:rgba(255,255,255,.06);font-weight:900}.done .check{color:#071008;background:var(--green);border-color:transparent}.waterControls{display:flex;gap:10px;align-items:center;margin-top:13px}.roundBtn{width:44px;height:44px;border:0;border-radius:50%;background:rgba(255,255,255,.12);color:white;font-size:24px;font-weight:650}.waterBar{height:10px;background:rgba(255,255,255,.10);border-radius:999px;overflow:hidden;flex:1}.waterFill{height:100%;background:linear-gradient(90deg,var(--blue),var(--violet));border-radius:999px;transition:width .25s ease}.smallNote{font-size:12px;color:var(--muted);text-align:center;margin-top:18px;line-height:1.4}.toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(20px);opacity:0;background:rgba(255,255,255,.14);border:1px solid var(--line);backdrop-filter:blur(20px);padding:12px 16px;border-radius:999px;transition:.25s;color:white;box-shadow:var(--shadow);z-index:10}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:390px){.heroGrid{grid-template-columns:1fr}.ringWrap{margin:auto}.brand{font-size:28px}}
</style>
</head>
<body>
<div class="app">
  <div class="top"><div class="brand">Daily</div><div class="pill" id="tagPill">Tag 1 / 75</div></div>
  <section class="hero">
    <div class="date" id="dateText"></div>
    <div class="headline" id="headline">Willkommen zurück ✨</div>
    <div class="heroGrid">
      <div class="ringWrap"><svg width="144" height="144" viewBox="0 0 144 144"><circle cx="72" cy="72" r="60" stroke="rgba(255,255,255,.12)" stroke-width="14" fill="none"/><circle id="ring" cx="72" cy="72" r="60" stroke="url(#grad)" stroke-width="14" fill="none" stroke-linecap="round" stroke-dasharray="377" stroke-dashoffset="377"/><defs><linearGradient id="grad"><stop stop-color="#ff6fb1"/><stop offset=".5" stop-color="#8c6cff"/><stop offset="1" stop-color="#5ed0ff"/></linearGradient></defs></svg><div class="ringText"><div class="percent" id="percent">0%</div><div class="doneText" id="doneText">0 / 9 erledigt</div></div></div>
      <div class="stats"><div class="stat"><b id="points">0</b><span>Punkte heute</span></div><div class="stat"><b id="streak">🔥 0</b><span>Streak</span></div></div>
    </div>
  </section>
  <div class="sectionTitle"><h2>Heute</h2><button id="resetBtn">Tag resetten</button></div>
  <div class="cards" id="cards"></div>
  <div class="smallNote">Daily speichert alles lokal auf deinem iPhone. Wasser zählt ab 8 Gläsern als erledigt, jedes weitere Glas gibt Bonuspunkte.</div>
</div>
<div class="toast" id="toast">Erledigt ✨</div>
<script>
const todayKey=()=>new Date().toISOString().slice(0,10); const storeKey='daily-v1-1';
const defaults={startDate:todayKey(),history:{}};
let data=JSON.parse(localStorage.getItem(storeKey)||'null')||defaults;
if(!data.history[todayKey()]) data.history[todayKey()]={water:0,tasks:{}};
const tasks=[
{id:'sport',emoji:'🏋️',title:'Sport',sub:'Yoga, Workout, Laufen oder Reiten',points:25,c:'#ffb86b'},
{id:'horse',emoji:'🐴',title:'Pferd',sub:'Versorgen, Reiten, Bodenarbeit, Kuscheln',points:20,c:'#b8895b'},
{id:'move',emoji:'🚶',title:'Bewegung',sub:'Spaziergang, Schrittziel oder Radfahren',points:20,c:'#79f2a5'},
{id:'food',emoji:'🥗',title:'Ernährung',sub:'Clean-Day geschafft',points:25,c:'#9cff7d'},
{id:'selfcare',emoji:'🧘',title:'Selfcare',sub:'Minidusche, Meditation oder Relaxen',points:15,c:'#c48cff'},
{id:'hygiene',emoji:'🪥',title:'Hygiene',sub:'Skincare, Dusche, Zahnpflege',points:10,c:'#5ed0ff'},
{id:'tidy',emoji:'🧹',title:'Aufräumen',sub:'Eine kleine Zone resetten',points:10,c:'#ffe07a'},
{id:'todo',emoji:'📋',title:'To-Do',sub:'Eine Sache abarbeiten',points:15,c:'#cfd2ff'}];
function save(){localStorage.setItem(storeKey,JSON.stringify(data))} function day(){return data.history[todayKey()]} function haptic(){try{navigator.vibrate&&navigator.vibrate(12)}catch(e){}}
function daysSinceStart(){return Math.max(1,Math.floor((new Date(todayKey())-new Date(data.startDate))/(86400000))+1)}
function isDone(t){return !!day().tasks[t.id]} function waterDone(){return day().water>=8}
function progress(){let done=(waterDone()?1:0)+tasks.filter(isDone).length; return {done,total:tasks.length+1,pct:Math.round(done/(tasks.length+1)*100)}}
function points(){let p=Math.min(day().water,8)*2+Math.max(0,day().water-8)*1; tasks.forEach(t=>{if(isDone(t))p+=t.points}); return p}
function streak(){let s=0,d=new Date(todayKey()); while(true){let k=d.toISOString().slice(0,10), rec=data.history[k]; if(!rec)break; let complete=(rec.water>=8)+tasks.filter(t=>rec.tasks&&rec.tasks[t.id]).length; if(complete<1)break; s++; d.setDate(d.getDate()-1)} return s}
function toast(txt){let el=document.getElementById('toast'); el.textContent=txt; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),1100)}
function render(){let d=day(), p=progress(); document.getElementById('dateText').textContent=new Date().toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long'}); document.getElementById('tagPill').textContent=`Tag ${daysSinceStart()} / 75`; document.getElementById('percent').textContent=p.pct+'%'; document.getElementById('doneText').textContent=`${p.done} / ${p.total} erledigt`; document.getElementById('points').textContent=points(); document.getElementById('streak').textContent='🔥 '+streak(); document.getElementById('headline').textContent=p.pct===100?'Stark, heute ist komplett 🎉':p.pct>=50?'Halbzeit. Du bist gut unterwegs 💪':'Lass uns klein anfangen 🌱'; document.getElementById('ring').style.strokeDashoffset=377-(377*p.pct/100);
const cards=document.getElementById('cards'); cards.innerHTML='';
let w=document.createElement('div'); w.className='card '+(waterDone()?'done':''); w.style.setProperty('--c','#5ed0ff'); w.innerHTML=`<div class="row"><div class="left"><div class="icon">💧</div><div><div class="title">Wasser</div><div class="sub">${d.water} / 8 Gläser ${d.water>8?' · ⭐ '+(d.water-8)+' Bonus':''}</div></div></div><div class="check">✓</div></div><div class="waterControls"><button class="roundBtn" id="minus">−</button><div class="waterBar"><div class="waterFill" style="width:${Math.min(100,d.water/8*100)}%"></div></div><button class="roundBtn" id="plus">+</button></div>`; cards.appendChild(w); w.querySelector('#plus').onclick=e=>{e.stopPropagation();d.water++;save();haptic();toast(d.water>=8?'Hydrated 💧':'Glas gezählt');render()}; w.querySelector('#minus').onclick=e=>{e.stopPropagation();d.water=Math.max(0,d.water-1);save();haptic();render()};
tasks.forEach(t=>{let el=document.createElement('div'); el.className='card '+(isDone(t)?'done':''); el.style.setProperty('--c',t.c); el.innerHTML=`<div class="row"><div class="left"><div class="icon">${t.emoji}</div><div><div class="title">${t.title}</div><div class="sub">${t.sub}</div></div></div><div class="check">✓</div></div>`; el.onclick=()=>{d.tasks[t.id]=!d.tasks[t.id];save();haptic();toast(d.tasks[t.id]?'Erledigt ✨':'Zurückgesetzt');render()}; cards.appendChild(el)})}
document.getElementById('resetBtn').onclick=()=>{if(confirm('Heutigen Tag wirklich resetten?')){data.history[todayKey()]={water:0,tasks:{}};save();render()}}; render();
</script>
</body>
</html>
