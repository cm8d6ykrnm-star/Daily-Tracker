<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="75 Glow" />
  <meta name="theme-color" content="#120821" />
  <title>75 Glow Tracker</title>
  <style>
    :root {
      --bg: #100719;
      --card: rgba(255,255,255,.09);
      --card2: rgba(255,255,255,.14);
      --text: #fff7ff;
      --muted: rgba(255,255,255,.68);
      --line: rgba(255,255,255,.14);
      --accent: #ff7ad9;
      --accent2: #8b5cff;
      --accent3: #4de1ff;
      --good: #8dffcb;
      --danger: #ff7a98;
      --shadow: 0 20px 60px rgba(0,0,0,.38);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 8%, rgba(255,122,217,.35), transparent 32%),
        radial-gradient(circle at 82% 4%, rgba(77,225,255,.20), transparent 26%),
        radial-gradient(circle at 50% 70%, rgba(139,92,255,.32), transparent 36%),
        linear-gradient(180deg, #1b0b2c 0%, #100719 55%, #07040c 100%);
      padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
      overflow-x: hidden;
    }
    .app { max-width: 460px; margin: 0 auto; padding: 18px 0 28px; }
    .top { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:18px; }
    .eyebrow { color: var(--muted); font-size: 13px; letter-spacing:.08em; text-transform:uppercase; }
    h1 { margin: 3px 0 0; font-size: 30px; line-height:1; letter-spacing:-.04em; }
    .pill { border:1px solid var(--line); background:rgba(255,255,255,.08); border-radius:999px; padding:9px 12px; font-weight:700; font-size:13px; box-shadow: var(--shadow); }
    .hero { position:relative; border:1px solid var(--line); background:linear-gradient(145deg, rgba(255,255,255,.16), rgba(255,255,255,.06)); border-radius:32px; padding:22px; box-shadow: var(--shadow); overflow:hidden; }
    .hero::after { content:""; position:absolute; inset:-40%; background: radial-gradient(circle, rgba(255,255,255,.12), transparent 38%); transform: translate(35%, -25%); pointer-events:none; }
    .hero-inner { position:relative; z-index:1; display:grid; grid-template-columns: 146px 1fr; gap: 18px; align-items:center; }
    .ring { width:146px; height:146px; border-radius:50%; display:grid; place-items:center; background: conic-gradient(var(--accent) var(--deg), rgba(255,255,255,.12) 0); position:relative; box-shadow: inset 0 0 30px rgba(255,255,255,.08), 0 16px 44px rgba(255,122,217,.18); }
    .ring::before { content:""; position:absolute; inset:12px; border-radius:50%; background: rgba(16,7,25,.9); border:1px solid rgba(255,255,255,.12); }
    .ring-text { position:relative; text-align:center; }
    .pct { display:block; font-size:34px; font-weight:850; letter-spacing:-.06em; }
    .done-count { color: var(--muted); font-size:12px; font-weight:700; }
    .hero h2 { margin:0 0 7px; font-size:22px; letter-spacing:-.03em; }
    .hero p { margin:0; color:var(--muted); line-height:1.35; font-size:14px; }
    .stats { display:grid; grid-template-columns: repeat(3,1fr); gap:10px; margin:14px 0 18px; }
    .stat { border:1px solid var(--line); border-radius:22px; padding:13px 12px; background: rgba(255,255,255,.08); backdrop-filter: blur(18px); }
    .stat strong { display:block; font-size:20px; letter-spacing:-.04em; }
    .stat span { color:var(--muted); font-size:12px; }
    .section-title { display:flex; justify-content:space-between; align-items:center; margin:20px 2px 10px; }
    .section-title h3 { margin:0; font-size:18px; letter-spacing:-.03em; }
    button { font: inherit; color: inherit; }
    .small-btn { border:1px solid var(--line); background:rgba(255,255,255,.08); border-radius:999px; padding:8px 11px; font-size:13px; font-weight:700; }
    .tasks { display:grid; gap:10px; }
    .task { border:1px solid var(--line); border-radius:23px; padding:14px; display:flex; align-items:center; gap:12px; background: rgba(255,255,255,.085); backdrop-filter: blur(18px); box-shadow: 0 10px 30px rgba(0,0,0,.18); transition: transform .16s ease, background .16s ease, border-color .16s ease; }
    .task:active { transform: scale(.985); }
    .task.done { background: linear-gradient(135deg, rgba(255,122,217,.22), rgba(139,92,255,.20)); border-color: rgba(255,255,255,.28); }
    .check { width:34px; height:34px; border-radius:50%; display:grid; place-items:center; border:1.5px solid rgba(255,255,255,.30); background:rgba(255,255,255,.08); flex:0 0 auto; font-weight:900; }
    .task.done .check { background: linear-gradient(135deg, var(--accent), var(--accent2)); border:0; }
    .emoji { font-size:24px; width:28px; text-align:center; }
    .task-text { flex:1; min-width:0; }
    .task-title { font-size:16px; font-weight:780; }
    .task-sub { color:var(--muted); font-size:12px; margin-top:2px; }
    .edit-row { display:none; grid-template-columns: 46px 1fr; gap:8px; margin-top:10px; }
    .editing .edit-row { display:grid; }
    input, textarea { width:100%; border:1px solid var(--line); background:rgba(0,0,0,.24); color:var(--text); border-radius:16px; padding:11px 12px; outline:none; font:inherit; }
    textarea { min-height:96px; resize:vertical; }
    .journal { border:1px solid var(--line); border-radius:26px; padding:14px; background:rgba(255,255,255,.08); margin-top:10px; }
    .actions { display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:14px; }
    .primary { border:0; border-radius:20px; padding:14px; font-weight:850; background:linear-gradient(135deg, var(--accent), var(--accent2)); box-shadow: 0 14px 34px rgba(255,122,217,.22); }
    .secondary { border:1px solid var(--line); border-radius:20px; padding:14px; font-weight:800; background:rgba(255,255,255,.08); }
    .toast { position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px); opacity:0; background:rgba(20,10,32,.92); border:1px solid var(--line); border-radius:999px; padding:12px 16px; box-shadow:var(--shadow); transition:.25s ease; pointer-events:none; font-weight:750; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    .confetti { position:fixed; inset:0; pointer-events:none; overflow:hidden; }
    .piece { position:absolute; top:-10px; font-size:18px; animation: fall 1.6s linear forwards; }
    @keyframes fall { to { transform:translateY(110vh) rotate(420deg); opacity:.1; } }
    @media (max-width: 390px) { .hero-inner { grid-template-columns: 124px 1fr; } .ring { width:124px; height:124px; } .pct{font-size:29px} h1{font-size:27px} }
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <div><div class="eyebrow">75 Day Challenge</div><h1>75 Glow</h1></div>
      <div class="pill" id="todayLabel">Heute</div>
    </div>

    <section class="hero">
      <div class="hero-inner">
        <div class="ring" id="ring" style="--deg:0deg"><div class="ring-text"><span class="pct" id="pct">0%</span><span class="done-count" id="doneCount">0/0 done</span></div></div>
        <div><h2 id="dayTitle">Tag 1 von 75</h2><p id="motivation">Kleine Häkchen. Großer Glow.</p></div>
      </div>
    </section>

    <div class="stats">
      <div class="stat"><strong id="streak">0</strong><span>Streak</span></div>
      <div class="stat"><strong id="totalDays">1</strong><span>Challenge-Tag</span></div>
      <div class="stat"><strong id="perfectDays">0</strong><span>Perfect Days</span></div>
    </div>

    <div class="section-title"><h3>Heute abhaken</h3><button class="small-btn" id="editBtn">Bearbeiten</button></div>
    <div class="tasks" id="tasks"></div>

    <div class="section-title"><h3>Tagesreflexion</h3><button class="small-btn" id="saveBtn">Speichern</button></div>
    <div class="journal"><textarea id="journal" placeholder="Wie war dein Tag? Was hat gut geklappt?"></textarea></div>

    <div class="actions">
      <button class="secondary" id="prevDay">← Gestern</button>
      <button class="primary" id="nextDay">Morgen →</button>
    </div>
    <div class="actions">
      <button class="secondary" id="resetToday">Heute resetten</button>
      <button class="secondary" id="restart">Neu starten</button>
    </div>
  </div>
  <div class="toast" id="toast"></div><div class="confetti" id="confetti"></div>
<script>
const defaultTasks = [
  {emoji:'💧', title:'Wasser trinken', sub:'Dein Tagesziel erreichen'},
  {emoji:'🏃‍♀️', title:'Bewegung', sub:'Workout, Walk oder Reiten'},
  {emoji:'📖', title:'Lesen', sub:'Mindestens 10–20 Seiten'},
  {emoji:'🍎', title:'Ernährung', sub:'An deinen Plan gehalten'},
  {emoji:'📸', title:'Progress-Foto', sub:'Kurz festhalten'},
  {emoji:'🧘‍♀️', title:'Selfcare', sub:'Etwas für dich'},
  {emoji:'✍️', title:'Journal', sub:'Mini-Reflexion'}
];
const KEY='glow75-v2';
const todayISO=()=> new Date().toISOString().slice(0,10);
const dateAdd=(iso,n)=>{const d=new Date(iso+'T12:00:00'); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10)};
const daysBetween=(a,b)=> Math.round((new Date(b+'T12:00:00')-new Date(a+'T12:00:00'))/86400000);
let state = JSON.parse(localStorage.getItem(KEY)||'null') || {start: todayISO(), view: todayISO(), tasks: defaultTasks, days:{}};
function save(){localStorage.setItem(KEY, JSON.stringify(state));}
function ensureDay(){ state.days[state.view] ||= {done:Array(state.tasks.length).fill(false), journal:''}; while(state.days[state.view].done.length < state.tasks.length) state.days[state.view].done.push(false); }
function dayNum(){ return Math.min(75, Math.max(1, daysBetween(state.start,state.view)+1)); }
function perfectCount(){ return Object.values(state.days).filter(d=>d.done && d.done.length && d.done.every(Boolean)).length; }
function streak(){ let s=0, d=todayISO(); while(state.days[d] && state.days[d].done.every(Boolean)){s++; d=dateAdd(d,-1)} return s; }
function toast(msg){const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1600)}
function confetti(){const c=document.getElementById('confetti'); const bits=['✨','💖','✅','🌟']; for(let i=0;i<32;i++){const p=document.createElement('div'); p.className='piece'; p.textContent=bits[i%bits.length]; p.style.left=Math.random()*100+'vw'; p.style.animationDelay=Math.random()*0.25+'s'; c.appendChild(p); setTimeout(()=>p.remove(),1900)}}
function vibrate(){ if(navigator.vibrate) navigator.vibrate(12); }
function render(){ ensureDay(); save(); const day=state.days[state.view], done=day.done.filter(Boolean).length, total=state.tasks.length, pct=Math.round(done/total*100); document.getElementById('ring').style.setProperty('--deg', pct*3.6+'deg'); document.getElementById('pct').textContent=pct+'%'; document.getElementById('doneCount').textContent=done+'/'+total+' done'; document.getElementById('dayTitle').textContent='Tag '+dayNum()+' von 75'; document.getElementById('totalDays').textContent=dayNum(); document.getElementById('perfectDays').textContent=perfectCount(); document.getElementById('streak').textContent=streak(); document.getElementById('todayLabel').textContent = state.view===todayISO() ? 'Heute' : new Date(state.view+'T12:00:00').toLocaleDateString('de-AT',{day:'2-digit',month:'short'}); document.getElementById('journal').value=day.journal||''; const box=document.getElementById('tasks'); box.innerHTML=''; state.tasks.forEach((task,i)=>{ const el=document.createElement('div'); el.className='task '+(day.done[i]?'done':''); el.innerHTML=`<div class="check">${day.done[i]?'✓':''}</div><div class="emoji">${task.emoji}</div><div class="task-text"><div class="task-title">${escapeHtml(task.title)}</div><div class="task-sub">${escapeHtml(task.sub||'')}</div><div class="edit-row"><input value="${escapeAttr(task.emoji)}" data-k="emoji" data-i="${i}"><input value="${escapeAttr(task.title)}" data-k="title" data-i="${i}"><input style="grid-column:1/3" value="${escapeAttr(task.sub||'')}" data-k="sub" data-i="${i}"></div></div>`; el.onclick=(e)=>{ if(e.target.tagName==='INPUT') return; day.done[i]=!day.done[i]; vibrate(); const nowDone=day.done.filter(Boolean).length; if(nowDone===total && !el.classList.contains('done')) { confetti(); toast('Perfect day!'); } render(); }; box.appendChild(el); }); if(document.body.classList.contains('editing')) document.querySelectorAll('.task').forEach(x=>x.classList.add('editing')); document.querySelectorAll('input').forEach(inp=>inp.onchange=e=>{state.tasks[e.target.dataset.i][e.target.dataset.k]=e.target.value; save(); render();}); }
function escapeHtml(s){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function escapeAttr(s){return escapeHtml(s).replace(/'/g,'&#39;');}
document.getElementById('journal').oninput=e=>{ensureDay(); state.days[state.view].journal=e.target.value; save();};
document.getElementById('saveBtn').onclick=()=>toast('Gespeichert');
document.getElementById('editBtn').onclick=()=>{document.body.classList.toggle('editing'); document.getElementById('editBtn').textContent=document.body.classList.contains('editing')?'Fertig':'Bearbeiten'; render();};
document.getElementById('prevDay').onclick=()=>{state.view=dateAdd(state.view,-1); render();};
document.getElementById('nextDay').onclick=()=>{state.view=dateAdd(state.view,1); render();};
document.getElementById('resetToday').onclick=()=>{ensureDay(); state.days[state.view].done=Array(state.tasks.length).fill(false); toast('Tag zurückgesetzt'); render();};
document.getElementById('restart').onclick=()=>{ if(confirm('Challenge wirklich neu starten?')){state={start:todayISO(), view:todayISO(), tasks:state.tasks, days:{}}; toast('Neu gestartet'); render();}};
render();
</script>
</body>
</html>
